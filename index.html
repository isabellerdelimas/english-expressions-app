<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Expressions Practice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="setupPanel" class="practice-panel setup-panel" aria-label="Game setup">
        <header class="topbar">
          <div>
            <p class="eyebrow">Expression trainer</p>
            <h1>Set up your round</h1>
          </div>
        </header>

        <form id="setupForm" class="setup-form">
          <div class="field-row">
            <label for="playerCount">Players</label>
            <select id="playerCount" name="playerCount"></select>
          </div>

          <div id="playerFields" class="player-fields" aria-label="Player names"></div>

          <div class="field-row">
            <label for="questionCount">Questions</label>
            <select id="questionCount" name="questionCount"></select>
            <p id="questionCountHint" class="field-hint"></p>
          </div>

          <div id="setupError" class="feedback error hidden" role="alert"></div>

          <div class="actions">
            <button class="primary-button" type="submit">Start game</button>
          </div>
        </form>
      </section>

      <section id="gamePanel" class="practice-panel hidden" aria-label="English expression practice">
        <header class="topbar">
          <div>
            <p class="eyebrow">Expression trainer</p>
            <h1>Practice English expressions</h1>
          </div>
          <div class="score-grid" aria-label="Practice statistics">
            <div>
              <span id="scoreValue">0</span>
              <small>Score</small>
            </div>
            <div>
              <span id="streakValue">0</span>
              <small>Streak</small>
            </div>
            <div>
              <span id="progressValue">0/0</span>
              <small>Done</small>
            </div>
          </div>
        </header>

        <div class="toolbar" aria-label="Practice controls">
          <div id="resultTabs" class="segmented-control hidden" role="group" aria-label="Result views">
            <button class="mode-button active" type="button" data-view="scores">Scores</button>
            <button class="mode-button" type="button" data-view="missed">Missed</button>
          </div>
          <div class="toolbar-actions">
            <button id="settingsButton" class="icon-button" type="button" title="New settings" aria-label="New settings">
              <span aria-hidden="true">⚙</span>
            </button>
            <button id="shuffleButton" class="icon-button" type="button" title="Shuffle questions" aria-label="Shuffle questions">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progressBar"></div>
        </div>

        <article class="question-card">
          <div class="question-meta">
            <span id="questionNumber">Question 1</span>
            <span id="turnLabel">Player turn</span>
            <span id="modeLabel">All expressions</span>
          </div>

          <h2 id="expressionText">Loading...</h2>
          <p id="usageText" class="usage"></p>

          <div id="alternatives" class="alternatives" aria-label="Answer choices"></div>
          <div id="roundSummary" class="round-summary hidden" aria-label="Final scores"></div>
          <div id="missedSummary" class="missed-summary hidden" aria-label="Missed answers"></div>

          <div id="feedback" class="feedback" aria-live="polite"></div>

          <div class="actions">
            <button id="tipButton" class="secondary-button" type="button">Show tip</button>
            <button id="nextButton" class="primary-button" type="button" disabled>Next</button>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
