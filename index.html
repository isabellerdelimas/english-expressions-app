<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Expressions Practice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="practice-panel" aria-label="English expression practice">
        <header class="topbar">
          <div>
            <p class="eyebrow">Expression trainer</p>
            <h1>Practice English expressions</h1>
          </div>
          <div class="score-grid" aria-label="Practice statistics">
            <div>
              <span id="scoreValue">0</span>
              <small>Score</small>
            </div>
            <div>
              <span id="streakValue">0</span>
              <small>Streak</small>
            </div>
            <div>
              <span id="progressValue">0/0</span>
              <small>Done</small>
            </div>
          </div>
        </header>

        <div class="toolbar" aria-label="Practice controls">
          <div class="segmented-control" role="group" aria-label="Practice mode">
            <button class="mode-button active" type="button" data-mode="all">All</button>
            <button class="mode-button" type="button" data-mode="missed">Missed</button>
          </div>
          <button id="shuffleButton" class="icon-button" type="button" title="Shuffle questions" aria-label="Shuffle questions">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div id="progressBar"></div>
        </div>

        <article class="question-card">
          <div class="question-meta">
            <span id="questionNumber">Question 1</span>
            <span id="modeLabel">All expressions</span>
          </div>

          <h2 id="expressionText">Loading...</h2>
          <p id="usageText" class="usage"></p>

          <div id="alternatives" class="alternatives" aria-label="Answer choices"></div>

          <div id="feedback" class="feedback" aria-live="polite"></div>

          <div class="actions">
            <button id="tipButton" class="secondary-button" type="button">Show tip</button>
            <button id="nextButton" class="primary-button" type="button" disabled>Next</button>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
